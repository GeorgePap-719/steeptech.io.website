<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>steeptech | correct data. no compromise.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --grid-color: rgba(255, 255, 255, 0.04);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --grid-size: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Monaco, Consolas, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 3rem;
            overflow: hidden;
            position: relative;
        }

        /* Subtle grid background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    linear-gradient(var(--grid-color) 1px, transparent 1px),
                    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: 0;
            pointer-events: none;
        }

        /* Vignette effect to focus center */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, transparent 30%, var(--bg-color) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: left;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.04em;
            margin-bottom: 0.25rem;
        }

        .slogan {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .no-compromise {
            color: var(--text-primary);
            font-weight: 500;
        }

        footer {
            position: absolute;
            bottom: 3rem;
            left: 3rem;
            z-index: 2;
            font-size: 0.75rem;
            color: #222;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<main class="content">
    <h1>steeptech</h1>
    <p class="slogan">correct data. <span class="no-compromise">no compromise.</span></p>
</main>

<footer>
    dataset engine
</footer>
</body>
</html>
